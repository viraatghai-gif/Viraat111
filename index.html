<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Snake Game</title>
    <style>
        body { background-color: #1e1e24; color: white; font-family: sans-serif; text-align: center; }
        canvas { background-color: #111; border: 4px solid #4caf50; display: block; margin: 20px auto; }
        h1 { margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>Snake Game</h1>
    <p>Score: <span id="score">0</span> | Use Arrow Keys to Move</p>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let score = 0;
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}];
        let dx = grid, dy = 0;
        let food = {x: 80, y: 80};

        function main() {
            if (hasGameEnded()) {
                alert("Game Over! Your score: " + score);
                document.location.reload();
                return;
            }
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                main();
            }, 150);
        }

        function clearCanvas() { ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        function drawSnake() { ctx.fillStyle = '#4caf50'; snake.forEach(part => ctx.fillRect(part.x, part.y, grid-2, grid-2)); }
        function drawFood() { ctx.fillStyle = '#ff5722'; ctx.fillRect(food.x, food.y, grid-2, grid-2); }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').innerText = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * (canvas.width / grid)) * grid;
            food.y = Math.floor(Math.random() * (canvas.height / grid)) * grid;
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height;
        }

        document.addEventListener("keydown", event => {
            if (event.key === "ArrowLeft" && dx === 0) { dx = -grid; dy = 0; }
            if (event.key === "ArrowUp" && dy === 0) { dx = 0; dy = -grid; }
            if (event.key === "ArrowRight" && dx === 0) { dx = grid; dy = 0; }
            if (event.key === "ArrowDown" && dy === 0) { dx = 0; dy = grid; }
        });

        main();
    </script>
</body>
</html>
